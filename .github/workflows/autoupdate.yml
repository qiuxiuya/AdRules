name: Update Rules
on:
  schedule:
  - cron: '0 */6 * * *'

  workflow_dispatch:

  repository_dispatch:
    types:
    - Manual-Update

jobs:
  update-rules:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Update Upstream
      continue-on-error: false
      run: |
        pip install requests
        bash ./script/update_upstream.sh
        tar -czvf archive.tar.gz ./tmp/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: archive.tar.gz
        path: archive.tar.gz

    - name: Build Rules
      continue-on-error: false
      run: |
        bash ./script/update_content.sh
        bash ./script/update_dns.sh
        rm -f archive.tar.gz

    - name: Update other rules
      run: |
        mkdir -p rules
        cd rules
        rm -f *.txt
        wget https://raw.githubusercontent.com/damengzhu/banad/main/jiekouAD.txt
        cd ../

    - name: Git push assets to Github
      run: |
        git init
        git config --local user.name "actions"
        git config --local user.email "action@github.com"
        git checkout --orphan main
        git rm -rf .github
        git rm -rf script
        git rm -rf *.md
        git rm -rf LICENSE
        git add *.{conf,txt,list,html,json,srs,mrs} rules/* mod/*
        git commit -m "Update at $(TZ=UTC-8 date +"%Y-%m-%d %H:%M")"
        git push -f -u origin main

    - name: Auto Build
      continue-on-error: true
      run: |
        curl -X POST "${{ secrets.CF_TOKEN }}"

